name: Restructure Repository
on:
  workflow_dispatch  # allows manual trigger

jobs:
  move-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create directories and move files
        run: |
          mkdir -p packages/delta_os_core services/orchestrator

          # Move Dart/Flutter files
          mv lib/ packages/delta_os_core/ 2>/dev/null || true
          mv test/ packages/delta_os_core/ 2>/dev/null || true
          mv bin/ packages/delta_os_core/ 2>/dev/null || true
          mv pubspec.yaml analysis_options.yaml CHANGELOG.md packages/delta_os_core/ 2>/dev/null || true

          # Move Python files
          mv *.py services/orchestrator/ 2>/dev/null || true
          mv api/ models/ services/orchestrator/ 2>/dev/null || true
          mv requirements.txt pyproject.toml services/orchestrator/ 2>/dev/null || true
          mv delta_net_async.py ultimate_orchestrator.py services/orchestrator/ 2>/dev/null || true

          # Update CI workflow paths (adjust to new location)
          find .github/workflows -name "*.yml" -exec sed -i 's|pubspec.yaml|packages/delta_os_core/pubspec.yaml|g' {} \;
          find .github/workflows -name "*.yml" -exec sed -i 's|cd packages/delta_os_core && |cd packages/delta_os_core \&\& |g' {} \;

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: restructure repo into packages/delta_os_core and services/orchestrator"
          branch: main